name: Sentinel-2 Reservoir Monitoring

on:
  schedule:
    - cron: '0 0 */7 * *'  # Runs approximately every 7 days
  push:
    branches: [ master ]
  workflow_dispatch:      # Allows manual execution from the GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0    # Fetch all history so diffing and committing works properly

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Reservoir Monitor Pipeline
      env:
        CDSE_USERNAME: ${{ secrets.CDSE_USERNAME }}
        CDSE_PASSWORD: ${{ secrets.CDSE_PASSWORD }}
      run: |
        python scripts/process_reservoirs.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Check if there are changes to commit in the outputs/ directory
        if [ -d "outputs" ] && [ -n "$(git status --porcelain outputs/)" ]; then
          git add outputs/
          git commit -m "Auto-update reservoir water levels: $(date +'%Y-%m-%d')"
          git push
          echo "Changes committed and pushed successfully."
        else
          echo "No new updates or changes detected."
        fi
